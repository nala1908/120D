<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>120 Degreez Project Search</title>

<style>
:root {
  --accent: #7c3aed;
  --bg: #f5f7fb;
  --panel: #ffffff;
  --text: #172033;
  --muted: #667085;
  --border: rgba(0,0,0,0.08);
  --hover: rgba(124, 58, 237, 0.08);
}

body {
  font-family: Consolas, monospace;
  background: var(--bg);
  color: var(--text);
  padding: 16px;
}

.shell { max-width: 1100px; margin: auto; }

.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

h1 { font-size: 22px; margin: 0; }

.toolbar {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  margin-bottom: 10px;
}

.input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

.results {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

tbody tr:hover {
  background: var(--hover);
}

.project-number {
  font-weight: bold;
}

.mini-btn {
  padding: 5px 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: white;
  cursor: pointer;
  font-size: 12px;
  margin-right: 5px;
}

.mini-btn:hover {
  background: var(--hover);
}

.selected {
  outline: 2px solid var(--accent);
  background: var(--hover);
}
</style>
</head>

<body>
<div class="shell">

<div class="hero">
  <h1>Project Search</h1>
  <div>Projects: <b id="statProjects">0</b> | Results: <b id="statVisible">0</b></div>
</div>

<div class="toolbar">
  <input id="search" class="input" placeholder="Search project number or name..." />
</div>

<div class="results">
<table>
<thead>
<tr>
  <th>Project Number</th>
  <th>Project Name</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>
const CSV_URL = "https://raw.githubusercontent.com/nala1908/120D/refs/heads/main/120_DEGREEZ_MASTER_PROJECT_LIST_separated.csv";

let projects = [];
let filtered = [];
let selectedIndex = -1;

const searchInput = document.getElementById("search");
const tableBody = document.getElementById("tableBody");
const statProjects = document.getElementById("statProjects");
const statVisible = document.getElementById("statVisible");

// ✅ Parse CSV (WITH PATH)
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  lines.shift();
  return lines.map(line => {
    const parts = line.split(",");
    return {
      number: parts[0]?.trim() || "",
      name: parts[1]?.trim() || "",
      path: parts[2]?.trim() || ""
    };
  });
}

// ✅ Fuzzy search
function fuzzyMatch(text, term) {
  let t = 0;
  for (let i = 0; i < text.length && t < term.length; i++) {
    if (text[i] === term[t]) t++;
  }
  return t === term.length;
}

// ✅ Filter
function filterProjects() {
  const term = searchInput.value.toLowerCase();

  filtered = projects.filter(p => {
    return (
      p.number.toLowerCase().includes(term) ||
      p.name.toLowerCase().includes(term) ||
      fuzzyMatch(p.number.toLowerCase(), term) ||
      fuzzyMatch(p.name.toLowerCase(), term)
    );
  });

  render();
}

// ✅ Render
function render() {
  tableBody.innerHTML = "";

  if (!filtered.length) {
    tableBody.innerHTML = `<tr><td colspan="3">No results</td></tr>`;
    return;
  }

  filtered.forEach((p, index) => {
    const row = document.createElement("tr");

    row.classList.toggle("selected", index === selectedIndex);

    row.innerHTML = `
      <td class="project-number">${p.number}</td>
      <td>${p.name}</td>
      <td>
        <button class="mini-btn open">Open</button>
        <button class="mini-btn copy">Copy</button>
      </td>
    `;

    // ✅ Double click
    row.addEventListener("dblclick", () => {
      if (p.path) openPath(p.path);
    });

    // ✅ Buttons
    row.querySelector(".open").onclick = (e) => {
      e.stopPropagation();
      openPath(p.path);
    };

    row.querySelector(".copy").onclick = (e) => {
      e.stopPropagation();
      navigator.clipboard.writeText(p.path);
    };

    tableBody.appendChild(row);
  });

  statProjects.textContent = projects.length;
  statVisible.textContent = filtered.length;
}

// ✅ Open path
function openPath(path) {
  window.open(`file:///${path.replace(/\\/g, "/")}`, "_blank");
}

// ✅ Keyboard navigation
document.addEventListener("keydown", (e) => {
  if (!filtered.length) return;

  if (e.key === "ArrowDown") {
    selectedIndex = Math.min(selectedIndex + 1, filtered.length - 1);
  }

  if (e.key === "ArrowUp") {
    selectedIndex = Math.max(selectedIndex - 1, 0);
  }

  if (e.key === "Enter" && selectedIndex >= 0) {
    openPath(filtered[selectedIndex].path);
  }

  render();
});

// Load CSV
async function load() {
  const res = await fetch(CSV_URL);
  const text = await res.text();
  projects = parseCSV(text);
  filtered = [...projects];
  render();
}

searchInput.addEventListener("input", () => {
  selectedIndex = -1;
  filterProjects();
});

load();
</script>

</body>
</html>

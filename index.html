<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>120 Degreez Project Search</title>
  <style>
    :root {
      --accent: #7c3aed;
      --bg: #f5f7fb;
      --panel: rgba(255,255,255,0.9);
      --text: #172033;
      --muted: #667085;
      --border: rgba(23,32,51,0.10);
      --shadow: 0 12px 30px rgba(31, 41, 55, 0.10);
      --hover: rgba(124, 58, 237, 0.06);
      --thead: #f8faff;
      --input: #ffffff;
      --highlight: var(--accent);
    }

    body.dark {
      --bg: #08111f;
      --panel: rgba(11, 18, 32, 0.9);
      --text: #e6edf7;
      --muted: #9fb0c7;
      --border: rgba(230,237,247,0.10);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
      --hover: rgba(125, 211, 252, 0.08);
      --thead: #10192b;
      --input: #0f172a;
    }

    * { box-sizing: border-box; }
    body {
      margin:0;
      padding:14px;
      font-family: Consolas, monospace;
      background: var(--bg);
      color: var(--text);
    }

    .shell{max-width:1100px;margin:auto}

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .title-row{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .logo{height:34px}

    h1{
      margin:0;
      font-size:20px;
      font-weight:700;
    }

    .subtitle{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
    }

    .stats{
      display:flex;
      gap:10px;
      font-size:12px;
    }

    .stat{background:var(--panel);padding:6px 10px;border-radius:8px;border:1px solid var(--border)}

    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
      box-shadow:var(--shadow);
    }

    .toolbar{
      display:grid;
      grid-template-columns:1fr repeat(4,auto);
      gap:8px;
      margin-bottom:10px;
    }

    input,select,button,label{
      min-height:36px;
      border-radius:10px;
      border:1px solid var(--border);
      padding:6px 10px;
      background:var(--input);
      color:var(--text);
      font:inherit;
    }

    button,label{cursor:pointer}

    table{width:100%;border-collapse:collapse}

    th,td{padding:10px;border-bottom:1px solid var(--border)}

    th{background:var(--thead);cursor:pointer;font-size:12px}

    tr:hover{background:var(--hover)}

    .highlight{background:var(--accent);color:#000;font-weight:bold;padding:0 2px;border-radius:3px}

    .status{font-size:12px;color:var(--muted);margin-bottom:6px}

    .footer{text-align:center;font-size:11px;color:var(--muted);margin-top:10px}

    @media(max-width:700px){
      .toolbar{grid-template-columns:1fr}
      table,thead,tbody,tr,td{display:block;width:100%}
      thead{display:none}
      tr{border:1px solid var(--border);margin-bottom:8px;border-radius:10px}
      td::before{content:attr(data-label);display:block;font-size:10px;color:var(--muted)}
    }

  </style>
</head>
<body>

<div class="shell">

  <div class="hero">
    <div>
      <div class="title-row">
        <img src="logo.png" class="logo">
        <h1>Project Search</h1>
      </div>
      <div class="subtitle">Search by number or name</div>
    </div>

    <div class="stats">
      <div class="stat" id="statProjects">0</div>
      <div class="stat" id="statVisible">0</div>
    </div>
  </div>

  <div class="panel">

    <div class="toolbar">
      <input id="search" placeholder="Search...">

      <select id="themeSelect">
        <option value="#7c3aed">Violet</option>
        <option value="#06b6d4">Cyan</option>
        <option value="#22c55e">Green</option>
        <option value="#f59e0b">Amber</option>
      </select>

      <button id="darkToggle">Dark: Off</button>
      <button id="reloadBtn">Reload</button>
      <label for="fileInput">CSV</label>
      <input id="fileInput" type="file" accept=".csv">
    </div>

    <div class="status" id="status">Loading...</div>

    <table>
      <thead>
        <tr>
          <th id="sortNumber">Number</th>
          <th id="sortName">Name</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="footer">120 DEGREEZ MEP ENGINEERING - INTERNAL ONLY - CREATED BY JEREMY GALLEGO - 2026 (R)</div>

  </div>

</div>

<script>
const CSV_URL="https://raw.githubusercontent.com/nala1908/120D/refs/heads/main/120_DEGREEZ_MASTER_PROJECT_LIST_separated.csv"

let projects=[]
let filtered=[]
let sortKey="number"
let sortDir=1

const search=document.getElementById("search")
const table=document.getElementById("tableBody")

function parseCSV(t){
const l=t.trim().split(/\r?\n/)
l.shift()
return l.map(r=>{
const p=r.split(",")
return{number:p[0].trim(),name:p.slice(1).join(",").trim()}
})}

function highlight(t,s){
if(!s)return t
return t.replace(new RegExp(`(${s})`,`gi`),"<span class='highlight'>$1</span>")
}

function render(){
const term=search.value.toLowerCase()
table.innerHTML=""
filtered.forEach(p=>{
const r=document.createElement("tr")
r.innerHTML=`
<td data-label="Number">${highlight(p.number,term)}</td>
<td data-label="Name">${highlight(p.name,term)}</td>`
table.appendChild(r)
})
}

function filter(){
const t=search.value.toLowerCase()
filtered=projects.filter(p=>p.number.toLowerCase().includes(t)||p.name.toLowerCase().includes(t))
sort()
render()
}

function sort(){
filtered.sort((a,b)=>a[sortKey]>b[sortKey]?sortDir:-sortDir)
}

search.addEventListener("input",filter)

document.getElementById("sortNumber").onclick=()=>{sortKey="number";sortDir*=-1;sort();render()}
document.getElementById("sortName").onclick=()=>{sortKey="name";sortDir*=-1;sort();render()}

async function load(){
try{
const r=await fetch(CSV_URL)
const t=await r.text()
projects=parseCSV(t)
filtered=[...projects]
sort()
render()
}catch{document.getElementById("status").innerText="Load failed"}
}

load()
</script>

</body>
</html>

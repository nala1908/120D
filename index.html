<!DOCTYPE html>
<html lang="en">
<head>
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
<link rel="manifest" href="./site.webmanifest">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>120 Degreez Project Search</title>
  <style>
    :root {
      --accent: #7c3aed;
      --bg: #f5f7fb;
      --panel: rgba(255,255,255,0.9);
      --panel-solid: #ffffff;
      --text: #172033;
      --muted: #667085;
      --border: rgba(23,32,51,0.10);
      --shadow: 0 12px 30px rgba(31, 41, 55, 0.10);
      --hover: rgba(124, 58, 237, 0.06);
      --thead: #f8faff;
      --input: #ffffff;
      --bad: #b42318;
      --link: #2563eb;
      --link-hover: #1d4ed8;
    }

    body.dark {
      --bg: #08111f;
      --panel: rgba(11, 18, 32, 0.92);
      --panel-solid: #0f172a;
      --text: #e6edf7;
      --muted: #9fb0c7;
      --border: rgba(230,237,247,0.10);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.30);
      --hover: rgba(125, 211, 252, 0.08);
      --thead: #10192b;
      --input: #0f172a;
      --link: #7dd3fc;
      --link-hover: #bae6fd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 14px;
      font-family: Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s ease, color 0.2s ease;
    }

    .shell {
      max-width: 1180px;
      margin: auto;
    }

    .hero {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px 8px;
      margin-bottom: 10px;
      align-items: center;
    }

    .title-block {
      min-width: 0;
    }

    .title-row {
      display: flex;
      align-items: center;
    }

    .logo {
      height: 34px;
      width: auto;
      border-radius: 6px;
      display: block;
    }

    .header-tools {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .header-tools #search {
      width: 100%;
      max-width: none;
      min-width: 180px;
      flex: 1 1 520px;
    }

    .header-tools select,
    .header-tools button {
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      min-width: 86px;
    }

    .stat-inline {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    input, select, button {
      min-height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 5px 8px;
      background: var(--input);
      color: var(--text);
      font: inherit;
    }

    input:focus, select:focus, button:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.10);
    }

    button {
      cursor: pointer;
    }

    button:hover, select:hover {
      background: var(--hover);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: var(--thead);
      cursor: pointer;
      font-size: 12px;
      user-select: none;
    }

    tr:hover {
      background: var(--hover);
    }

    .highlight {
      background: var(--accent);
      color: #000;
      font-weight: bold;
      padding: 0 2px;
      border-radius: 3px;
    }

    .path-link {
      color: var(--link);
      text-decoration: none;
      word-break: break-word;
    }

    .path-link:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 18px;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.4;
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .header-tools,
      .stats {
        justify-content: flex-start;
      }
    }

    @media (max-width: 700px) {
      .header-tools {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        width: 100%;
      }

      .header-tools #search {
        grid-column: 1 / -1;
        max-width: none;
        min-width: 0;
      }

      input, select, button {
        min-height: 30px;
        padding: 4px 6px;
        font-size: 12px;
      }

      .stats {
        width: 100%;
        justify-content: flex-start;
      }

      table, thead, tbody, tr, td {
        display: block;
        width: 100%;
      }

      thead {
        display: none;
      }

      tr {
        border: 1px solid var(--border);
        margin-bottom: 8px;
        border-radius: 10px;
        overflow: hidden;
      }

      td::before {
        content: attr(data-label);
        display: block;
        font-size: 10px;
        color: var(--muted);
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
    }
  </style>
</head>
<body>

<div class="shell">

  <div class="hero">
    <div class="title-block">
      <div class="title-row">
        <img src="logo.png" class="logo" alt="120 Degreez Logo">
      </div>
    </div>

    <div class="header-tools">
      <input id="search" placeholder="Search by number, name, or path" aria-label="Search projects">

      <select id="themeSelect" aria-label="Accent color">
        <option value="#7c3aed">Violet</option>
        <option value="#06b6d4">Cyan</option>
        <option value="#22c55e">Green</option>
        <option value="#f59e0b">Amber</option>
        <option value="#ef4444">Red</option>
        <option value="#ec4899">Pink</option>
      </select>

      <button id="darkToggle" type="button">Dark: Off</button>
    </div>

    <div class="stats">
      <div class="stat stat-inline">
        <span class="stat-label">Loaded:</span>
        <span class="stat-value" id="statProjects">0</span>
        <span class="stat-label">Visible:</span>
        <span class="stat-value" id="statVisible">0</span>
      </div>
    </div>
  </div>

  <div class="panel">
    <table>
      <thead>
        <tr>
          <th id="sortNumber">Number</th>
          <th id="sortName">Name</th>
          <th id="sortPath">Path</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="3" class="empty">Loading project list...</td></tr>
      </tbody>
    </table>

    <div class="footer">120 DEGREEZ MEP ENGINEERING - INTERNAL ONLY - CREATED BY JEREMY GALLEGO - 2026 (R)</div>
  </div>

</div>

<script>
const CSV_URL = "https://raw.githubusercontent.com/nala1908/120D/refs/heads/main/120_DEGREEZ_MASTER_PROJECT_LIST_separated.csv";

let projects = [];
let filtered = [];
let sortKey = "number";
let sortDir = 1;

const search = document.getElementById("search");
const table = document.getElementById("tableBody");
const statProjects = document.getElementById("statProjects");
const statVisible = document.getElementById("statVisible");
const themeSelect = document.getElementById("themeSelect");
const darkToggle = document.getElementById("darkToggle");

function parseCSVLine(line) {
  const cells = [];
  let current = "";
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    const next = line[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        current += '"';
        i += 1;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === "," && !inQuotes) {
      cells.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  cells.push(current);
  return cells;
}

function findColumnIndex(header, options, fallbackIndex) {
  const normalizedOptions = options.map(option => option.toLowerCase());
  const index = header.findIndex(cell => normalizedOptions.includes(cell));
  return index === -1 ? fallbackIndex : index;
}

function parseCSV(text) {
  const lines = text
    .replace(/^\uFEFF/, "")
    .split(/\r?\n/)
    .filter(line => line.trim().length > 0);

  if (!lines.length) return [];

  const header = parseCSVLine(lines[0]).map(cell => cell.trim().toLowerCase());
  const numberIndex = findColumnIndex(header, ["project number", "number", "project #", "project no", "project_no"], 0);
  const nameIndex = findColumnIndex(header, ["project name", "name", "project", "project_name"], 1);
  const pathIndex = findColumnIndex(header, ["path", "folder path", "project path", "link", "url"], 2);

  return lines.slice(1).map(line => {
    const parts = parseCSVLine(line);
    return {
      number: (parts[numberIndex] || "").trim(),
      name: (parts[nameIndex] || "").trim(),
      path: (parts[pathIndex] || "").trim()
    };
  }).filter(project => project.number || project.name || project.path);
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function escapeRegExp(value) {
  return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function updateStats() {
  statProjects.textContent = String(projects.length);
  statVisible.textContent = String(filtered.length);
}

function highlight(text, term) {
  const safeText = escapeHtml(text);
  if (!term) return safeText;
  const safeTerm = escapeRegExp(term);
  return safeText.replace(new RegExp(`(${safeTerm})`, "gi"), "<span class='highlight'>$1</span>");
}

function getExplorerHref(path) {
  const value = String(path || "").trim();
  if (!value) return "";
  return "explorerpath://" + value.replace(/\\/g, "/");
}

function renderPath(path, term) {
  if (!path) return '<span style="color: var(--muted);">-</span>';
  const explorerHref = escapeHtml(getExplorerHref(path));
  const safeLabel = highlight(path, term);
  return `<a class="path-link" href="${explorerHref}">${safeLabel}</a>`;
}

function render() {
  const term = search.value.toLowerCase().trim();
  table.innerHTML = "";

  if (!filtered.length) {
    table.innerHTML = '<tr><td colspan="3" class="empty">No matching projects found.</td></tr>';
    updateStats();
    return;
  }

  filtered.forEach(project => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td data-label="Number">${highlight(project.number, term)}</td>
      <td data-label="Name">${highlight(project.name, term)}</td>
      <td data-label="Path">${renderPath(project.path, term)}</td>`;
    table.appendChild(row);
  });

  updateStats();
}

function sort() {
  filtered.sort((a, b) => {
    const av = (a[sortKey] || "").toLowerCase();
    const bv = (b[sortKey] || "").toLowerCase();
    if (av < bv) return -1 * sortDir;
    if (av > bv) return 1 * sortDir;
    return 0;
  });
}

function filter() {
  const t = search.value.toLowerCase().trim();
  filtered = projects.filter(project =>
    project.number.toLowerCase().includes(t) ||
    project.name.toLowerCase().includes(t) ||
    project.path.toLowerCase().includes(t)
  );
  sort();
  render();
}

async function load() {
  try {
    const response = await fetch(CSV_URL, { cache: "no-store" });
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    const text = await response.text();
    projects = parseCSV(text);
    filtered = [...projects];
    sort();
    render();
  } catch (error) {
    console.error(error);
    projects = [];
    filtered = [];
    render();
  }
}

search.addEventListener("input", filter);

document.getElementById("sortNumber").addEventListener("click", () => {
  if (sortKey === "number") sortDir *= -1;
  else {
    sortKey = "number";
    sortDir = 1;
  }
  sort();
  render();
});

document.getElementById("sortName").addEventListener("click", () => {
  if (sortKey === "name") sortDir *= -1;
  else {
    sortKey = "name";
    sortDir = 1;
  }
  sort();
  render();
});

document.getElementById("sortPath").addEventListener("click", () => {
  if (sortKey === "path") sortDir *= -1;
  else {
    sortKey = "path";
    sortDir = 1;
  }
  sort();
  render();
});

themeSelect.addEventListener("change", function() {
  document.documentElement.style.setProperty("--accent", this.value);
  localStorage.setItem("projectAccent", this.value);
});

darkToggle.addEventListener("click", function() {
  document.body.classList.toggle("dark");
  const enabled = document.body.classList.contains("dark");
  darkToggle.textContent = `Dark: ${enabled ? "On" : "Off"}`;
  localStorage.setItem("projectDark", enabled ? "1" : "0");
});

function loadPrefs() {
  const accent = localStorage.getItem("projectAccent");
  if (accent) {
    document.documentElement.style.setProperty("--accent", accent);
    themeSelect.value = accent;
  }

  const savedDark = localStorage.getItem("projectDark");
  const dark = savedDark === null ? true : savedDark === "1";

  if (dark) {
    document.body.classList.add("dark");
    darkToggle.textContent = "Dark: On";
  } else {
    darkToggle.textContent = "Dark: Off";
  }
}

loadPrefs();
updateStats();
load();
</script>

</body>
</html>

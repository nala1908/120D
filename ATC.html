<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Air Traffic Landing</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background:
        linear-gradient(to bottom, #8fd3ff 0%, #9edbff 68%, #95c47b 68%, #6ca35a 100%);
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.45);
      font-size: 18px;
      line-height: 1.45;
      user-select: none;
      pointer-events: none;
    }

    #gameOver {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      z-index: 20;
    }

    #gameOver .panel {
      background: rgba(15, 25, 35, 0.92);
      color: white;
      padding: 24px 28px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
      min-width: 280px;
    }

    #gameOver h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    #gameOver p {
      margin: 8px 0;
      font-size: 18px;
    }

    #restartBtn {
      margin-top: 16px;
      font-size: 18px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #3fa9f5;
      color: white;
      cursor: pointer;
      pointer-events: auto;
    }

    #hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 15px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.45);
      user-select: none;
      pointer-events: none;
      text-align: center;
      padding: 0 10px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Planes: <span id="planes">0</span></div>
    <div>Level: <span id="level">1</span></div>
  </div>

  <div id="hint">Tap a plane, then draw a path to the runway</div>

  <div id="gameOver">
    <div class="panel">
      <h1>Game Over</h1>
      <p>Final Score: <span id="finalScore">0</span></p>
      <p>Too many planes got too close.</p>
      <button id="restartBtn">Restart</button>
    </div>
  </div>

  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const planesEl = document.getElementById("planes");
    const levelEl = document.getElementById("level");
    const gameOverEl = document.getElementById("gameOver");
    const finalScoreEl = document.getElementById("finalScore");
    const restartBtn = document.getElementById("restartBtn");

    let w = 0;
    let h = 0;
    let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      setupRunway();
    }

    window.addEventListener("resize", resize);

    const state = {
      planes: [],
      score: 0,
      gameOver: false,
      selectedPlaneId: null,
      drawing: false,
      drawPoints: [],
      nextPlaneId: 1,
      lastTime: 0,
      spawnTimer: 0,
      spawnInterval: 3.2,
      elapsed: 0,
      difficultyTimer: 0,
      level: 1
    };

    const runway = {
      x: 0,
      y: 0,
      width: 0,
      height: 0,
      startX: 0,
      endX: 0,
      centerY: 0
    };

    function setupRunway() {
      runway.width = Math.min(180, w * 0.28);
      runway.height = Math.max(18, h * 0.032);
      runway.x = w * 0.5 - runway.width * 0.5;
      runway.y = h * 0.79;
      runway.startX = runway.x + 10;
      runway.endX = runway.x + runway.width - 10;
      runway.centerY = runway.y + runway.height * 0.5;
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function dist(x1, y1, x2, y2) {
      return Math.hypot(x2 - x1, y2 - y1);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function angleTo(x1, y1, x2, y2) {
      return Math.atan2(y2 - y1, x2 - x1);
    }

    function createPlane() {
      const side = Math.floor(Math.random() * 3);
      let x, y;

      if (side === 0) {
        x = -40;
        y = rand(50, h * 0.55);
      } else if (side === 1) {
        x = w + 40;
        y = rand(50, h * 0.55);
      } else {
        x = rand(40, w - 40);
        y = -40;
      }

      const baseSpeed = 58 + state.level * 7 + rand(0, 18);

      const defaultTarget = {
        x: runway.x + runway.width / 2 + rand(-40, 40),
        y: runway.y - 80 + rand(-30, 30)
      };

      return {
        id: state.nextPlaneId++,
        x,
        y,
        speed: baseSpeed,
        radius: 14,
        angle: angleTo(x, y, defaultTarget.x, defaultTarget.y),
        path: [defaultTarget],
        pathIndex: 0,
        selected: false,
        color: `hsl(${Math.floor(rand(0, 360))} 80% 60%)`,
        landing: false,
        landed: false,
        crash: false,
        nearMissTimer: 0
      };
    }

    function resetGame() {
      state.planes = [];
      state.score = 0;
      state.gameOver = false;
      state.selectedPlaneId = null;
      state.drawing = false;
      state.drawPoints = [];
      state.nextPlaneId = 1;
      state.lastTime = 0;
      state.spawnTimer = 0;
      state.spawnInterval = 3.2;
      state.elapsed = 0;
      state.difficultyTimer = 0;
      state.level = 1;
      gameOverEl.style.display = "none";

      for (let i = 0; i < 2; i++) {
        state.planes.push(createPlane());
      }

      updateUI();
    }

    function updateUI() {
      scoreEl.textContent = state.score;
      planesEl.textContent = state.planes.length;
      levelEl.textContent = state.level;
    }

    function getPointerPos(e) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches && e.touches[0] ? e.touches[0] : e;
      return {
        x: touch.clientX - rect.left,
        y: touch.clientY - rect.top
      };
    }

    function getPlaneAt(x, y) {
      for (let i = state.planes.length - 1; i >= 0; i--) {
        const p = state.planes[i];
        if (dist(x, y, p.x, p.y) <= p.radius + 10) {
          return p;
        }
      }
      return null;
    }

    function deselectAllPlanes() {
      for (const p of state.planes) {
        p.selected = false;
      }
    }

    function handleStart(e) {
      if (state.gameOver) return;
      e.preventDefault();

      const pos = getPointerPos(e);
      const plane = getPlaneAt(pos.x, pos.y);

      deselectAllPlanes();
      state.selectedPlaneId = null;
      state.drawPoints = [];
      state.drawing = false;

      if (plane) {
        plane.selected = true;
        state.selectedPlaneId = plane.id;
        state.drawing = true;
        state.drawPoints = [{ x: plane.x, y: plane.y }, { x: pos.x, y: pos.y }];
      }
    }

    function handleMove(e) {
      if (state.gameOver || !state.drawing || state.selectedPlaneId == null) return;
      e.preventDefault();

      const pos = getPointerPos(e);
      const last = state.drawPoints[state.drawPoints.length - 1];
      if (!last || dist(last.x, last.y, pos.x, pos.y) > 8) {
        state.drawPoints.push({ x: pos.x, y: pos.y });
      }
    }

    function handleEnd(e) {
      if (state.gameOver) return;
      if (!state.drawing || state.selectedPlaneId == null) return;
      e.preventDefault();

      const plane = state.planes.find(p => p.id === state.selectedPlaneId);
      if (plane && state.drawPoints.length >= 2) {
        const path = simplifyPath(state.drawPoints, 10);

        const end = path[path.length - 1];
        const runwayTarget = {
          x: clamp(end.x, runway.startX, runway.endX),
          y: runway.centerY
        };

        if (dist(end.x, end.y, runwayTarget.x, runwayTarget.y) > 25) {
          path.push({
            x: lerp(end.x, runwayTarget.x, 0.5),
            y: lerp(end.y, runwayTarget.y, 0.5)
          });
        }

        path.push(runwayTarget);
        plane.path = path.slice(1);
        plane.pathIndex = 0;
        plane.landing = true;
      }

      if (plane) plane.selected = false;
      state.selectedPlaneId = null;
      state.drawing = false;
      state.drawPoints = [];
    }

    function simplifyPath(points, minStep) {
      if (points.length <= 2) return points.slice();
      const out = [points[0]];
      for (let i = 1; i < points.length; i++) {
        const prev = out[out.length - 1];
        if (dist(prev.x, prev.y, points[i].x, points[i].y) >= minStep) {
          out.push(points[i]);
        }
      }
      if (out[out.length - 1] !== points[points.length - 1]) {
        out.push(points[points.length - 1]);
      }
      return out;
    }

    canvas.addEventListener("mousedown", handleStart);
    canvas.addEventListener("mousemove", handleMove);
    canvas.addEventListener("mouseup", handleEnd);
    canvas.addEventListener("mouseleave", handleEnd);

    canvas.addEventListener("touchstart", handleStart, { passive: false });
    canvas.addEventListener("touchmove", handleMove, { passive: false });
    canvas.addEventListener("touchend", handleEnd, { passive: false });
    canvas.addEventListener("touchcancel", handleEnd, { passive: false });

    restartBtn.addEventListener("click", resetGame);

    function update(delta) {
      if (state.gameOver) return;

      state.elapsed += delta;
      state.spawnTimer += delta;
      state.difficultyTimer += delta;

      if (state.difficultyTimer >= 10) {
        state.difficultyTimer = 0;
        state.level += 1;
        state.spawnInterval = Math.max(0.8, state.spawnInterval - 0.18);

        for (const p of state.planes) {
          p.speed *= 1.06;
        }
      }

      if (state.spawnTimer >= state.spawnInterval) {
        state.spawnTimer = 0;
        state.planes.push(createPlane());
      }

      for (const plane of state.planes) {
        updatePlane(plane, delta);
      }

      handleCollisions(delta);

      state.planes = state.planes.filter(p => !p.landed && !p.crash);

      if (state.planes.length > 20) {
        endGame();
      }

      updateUI();
    }

    function updatePlane(plane, delta) {
      plane.speed += delta * 0.35;

      let target = plane.path[plane.pathIndex];
      if (!target) {
        target = {
          x: runway.x + runway.width / 2,
          y: runway.y - 70
        };
      }

      const desiredAngle = angleTo(plane.x, plane.y, target.x, target.y);
      let angleDiff = desiredAngle - plane.angle;

      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

      const turnRate = 1.8 * delta;
      plane.angle += clamp(angleDiff, -turnRate, turnRate);

      plane.x += Math.cos(plane.angle) * plane.speed * delta;
      plane.y += Math.sin(plane.angle) * plane.speed * delta;

      if (dist(plane.x, plane.y, target.x, target.y) < Math.max(18, plane.speed * delta * 1.5)) {
        plane.pathIndex++;
      }

      if (plane.landing) {
        const onRunwayApproach =
          plane.pathIndex >= plane.path.length - 1 &&
          plane.y > runway.y - 14 &&
          plane.x >= runway.startX - 12 &&
          plane.x <= runway.endX + 12;

        if (onRunwayApproach) {
          plane.speed *= 0.992;
          plane.angle = 0;

          if (plane.x >= runway.endX) {
            plane.landed = true;
            state.score += 10;
          }
        }
      }

      if (
        plane.x < -120 ||
        plane.x > w + 120 ||
        plane.y < -120 ||
        plane.y > h + 120
      ) {
        plane.crash = true;
      }
    }

    function handleCollisions(delta) {
      let dangerPairs = 0;

      for (let i = 0; i < state.planes.length; i++) {
        for (let j = i + 1; j < state.planes.length; j++) {
          const a = state.planes[i];
          const b = state.planes[j];
          const d = dist(a.x, a.y, b.x, b.y);

          if (d < 18) {
            a.crash = true;
            b.crash = true;
            endGame();
            return;
          }

          if (d < 55) {
            dangerPairs++;
          }
        }
      }

      if (dangerPairs >= 3) {
        endGame();
      }

      if (state.planes.some(p => p.crash)) {
        endGame();
      }
    }

    function endGame() {
      state.gameOver = true;
      finalScoreEl.textContent = state.score;
      gameOverEl.style.display = "flex";
    }

    function draw() {
      ctx.clearRect(0, 0, w, h);
      drawClouds();
      drawRunway();
      drawGuides();
      drawPlanes();
    }

    function drawClouds() {
      const t = performance.now() * 0.00003;

      for (let i = 0; i < 5; i++) {
        const x = ((i * 260 + t * (40 + i * 4) * 1000) % (w + 220)) - 110;
        const y = 70 + i * 55 + Math.sin(t * 8 + i) * 10;
        drawCloud(x, y, 0.8 + i * 0.08);
      }
    }

    function drawCloud(x, y, s) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);
      ctx.fillStyle = "rgba(255,255,255,0.75)";
      ctx.beginPath();
      ctx.arc(0, 0, 18, 0, Math.PI * 2);
      ctx.arc(22, -8, 22, 0, Math.PI * 2);
      ctx.arc(48, 0, 18, 0, Math.PI * 2);
      ctx.arc(24, 8, 24, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawRunway() {
      ctx.save();

      const shadow = 12;
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.fillRect(runway.x + 4, runway.y + shadow, runway.width, runway.height);

      ctx.fillStyle = "#3f464d";
      roundRect(ctx, runway.x, runway.y, runway.width, runway.height, 8);
      ctx.fill();

      ctx.strokeStyle = "#dfe5ea";
      ctx.lineWidth = 2;

      const dashCount = 6;
      const dashW = runway.width / (dashCount * 2);
      for (let i = 0; i < dashCount; i++) {
        const dx = runway.x + dashW * (i * 2 + 0.5);
        ctx.beginPath();
        ctx.moveTo(dx, runway.centerY);
        ctx.lineTo(dx + dashW * 0.9, runway.centerY);
        ctx.stroke();
      }

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 14px Arial";
      ctx.fillText("RUNWAY", runway.x + runway.width / 2 - 30, runway.y - 8);

      ctx.restore();
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
    }

    function drawGuides() {
      if (state.drawPoints.length > 1) {
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineWidth = 3;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.setLineDash([10, 8]);
        ctx.beginPath();
        ctx.moveTo(state.drawPoints[0].x, state.drawPoints[0].y);
        for (let i = 1; i < state.drawPoints.length; i++) {
          ctx.lineTo(state.drawPoints[i].x, state.drawPoints[i].y);
        }
        ctx.stroke();
        ctx.restore();
      }

      for (const p of state.planes) {
        if (p.path && p.path.length > p.pathIndex) {
          ctx.save();
          ctx.strokeStyle = "rgba(255,255,255,0.35)";
          ctx.lineWidth = 2;
          ctx.setLineDash([6, 6]);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          for (let i = p.pathIndex; i < p.path.length; i++) {
            ctx.lineTo(p.path[i].x, p.path[i].y);
          }
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    function drawPlanes() {
      for (const plane of state.planes) {
        drawPlane(plane);
      }
    }

    function drawPlane(plane) {
      ctx.save();
      ctx.translate(plane.x, plane.y);
      ctx.rotate(plane.angle);

      if (plane.selected) {
        ctx.beginPath();
        ctx.arc(0, 0, plane.radius + 8, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255,255,255,0.95)";
        ctx.lineWidth = 3;
        ctx.stroke();
      }

      ctx.fillStyle = plane.color;
      ctx.strokeStyle = "rgba(0,0,0,0.28)";
      ctx.lineWidth = 1.5;

      ctx.beginPath();
      ctx.moveTo(18, 0);
      ctx.lineTo(4, -6);
      ctx.lineTo(-10, -6);
      ctx.lineTo(-15, -14);
      ctx.lineTo(-18, -14);
      ctx.lineTo(-14, -2);
      ctx.lineTo(-24, -2);
      ctx.lineTo(-24, 2);
      ctx.lineTo(-14, 2);
      ctx.lineTo(-18, 14);
      ctx.lineTo(-15, 14);
      ctx.lineTo(-10, 6);
      ctx.lineTo(4, 6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.beginPath();
      ctx.arc(7, 0, 2.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function loop(ts) {
      if (!state.lastTime) state.lastTime = ts;
      let delta = (ts - state.lastTime) / 1000;
      state.lastTime = ts;
      delta = Math.min(delta, 0.033);

      update(delta);
      draw();
      requestAnimationFrame(loop);
    }

    resize();
    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>

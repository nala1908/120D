<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Top Down Air Traffic Control</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #6caf5c;
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #6caf5c;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.45);
      font-size: 18px;
      line-height: 1.45;
      user-select: none;
      pointer-events: none;
    }

    #hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 15px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.45);
      user-select: none;
      pointer-events: none;
      text-align: center;
      padding: 0 10px;
    }

    #gameOver {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      z-index: 20;
    }

    #gameOver .panel {
      background: rgba(15, 25, 35, 0.94);
      color: white;
      padding: 24px 28px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
      min-width: 280px;
    }

    #gameOver h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    #gameOver p {
      margin: 8px 0;
      font-size: 18px;
    }

    #restartBtn {
      margin-top: 16px;
      font-size: 18px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #3fa9f5;
      color: white;
      cursor: pointer;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Planes: <span id="planes">0</span></div>
    <div>Level: <span id="level">1</span></div>
  </div>

  <div id="hint">Tap a plane, then draw a path to the runway</div>

  <div id="gameOver">
    <div class="panel">
      <h1>Game Over</h1>
      <p>Final Score: <span id="finalScore">0</span></p>
      <p>Planes got too close.</p>
      <button id="restartBtn">Restart</button>
    </div>
  </div>

  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const planesEl = document.getElementById("planes");
    const levelEl = document.getElementById("level");
    const gameOverEl = document.getElementById("gameOver");
    const finalScoreEl = document.getElementById("finalScore");
    const restartBtn = document.getElementById("restartBtn");

    let w = 0;
    let h = 0;
    let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

    const state = {
      planes: [],
      score: 0,
      gameOver: false,
      selectedPlaneId: null,
      drawing: false,
      drawPoints: [],
      nextPlaneId: 1,
      lastTime: 0,
      spawnTimer: 0,
      spawnInterval: 4.5,
      elapsed: 0,
      difficultyTimer: 0,
      level: 1,
      popups: [],
      conflicts: [],
      decor: {
        fields: [],
        ponds: [],
        forests: []
      }
    };

    const runway = {
      x: 0,
      y: 0,
      width: 0,
      height: 0,
      centerX: 0,
      centerY: 0,
      entryX: 0,
      entryY: 0,
      exitX: 0,
      exitY: 0
    };

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      setupRunway();
      generateLandscape();
    }

    function setupRunway() {
      runway.width = Math.min(110, w * 0.14);
      runway.height = Math.min(340, h * 0.42);
      runway.x = w * 0.5 - runway.width * 0.5;
      runway.y = h * 0.5 - runway.height * 0.5;
      runway.centerX = runway.x + runway.width * 0.5;
      runway.centerY = runway.y + runway.height * 0.5;
      runway.entryX = runway.centerX;
      runway.entryY = runway.y - 34;
      runway.exitX = runway.centerX;
      runway.exitY = runway.y + runway.height + 40;
      runway.gateY = runway.y - 54;
      runway.gateHalfWidth = runway.width * 0.8;
    }

    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function generateLandscape() {
      const fields = [];
      const ponds = [];
      const forests = [];

      const runwaySafeX = runway.x - 120;
      const runwaySafeY = runway.y - 140;
      const runwaySafeW = runway.width + 240;
      const runwaySafeH = runway.height + 280;

      let tries = 0;
      while (fields.length < 11 && tries < 80) {
        tries++;
        const fw = rand(90, 220);
        const fh = rand(70, 180);
        const fx = rand(20, w - fw - 20);
        const fy = rand(20, h - fh - 20);

        if (rectsOverlap(fx, fy, fw, fh, runwaySafeX, runwaySafeY, runwaySafeW, runwaySafeH)) continue;

        fields.push({
          x: fx,
          y: fy,
          w: fw,
          h: fh,
          color: pick(["#7fb765", "#72ae59", "#8dc06f", "#99c878", "#6aa352"])
        });
      }

      tries = 0;
      while (ponds.length < 2 && tries < 30) {
        tries++;
        const pw = rand(70, 130);
        const ph = rand(45, 95);
        const px = rand(30, w - pw - 30);
        const py = rand(30, h - ph - 30);

        if (rectsOverlap(px, py, pw, ph, runwaySafeX, runwaySafeY, runwaySafeW, runwaySafeH)) continue;

        ponds.push({ x: px, y: py, w: pw, h: ph });
      }

      const forestAnchors = [
        [w * 0.15, h * 0.15],
        [w * 0.82, h * 0.18],
        [w * 0.18, h * 0.82],
        [w * 0.82, h * 0.76],
        [w * 0.68, h * 0.48]
      ];

      for (const [cx, cy] of forestAnchors) {
        if (
          cx > runwaySafeX &&
          cx < runwaySafeX + runwaySafeW &&
          cy > runwaySafeY &&
          cy < runwaySafeY + runwaySafeH
        ) {
          continue;
        }

        const trees = [];
        for (let i = 0; i < 8; i++) {
          trees.push({
            x: cx + rand(-28, 28),
            y: cy + rand(-28, 28),
            r: rand(8, 13),
            color: Math.random() < 0.5 ? "#3f7f3d" : "#2f6b35"
          });
        }
        forests.push(trees);
      }

      state.decor.fields = fields;
      state.decor.ponds = ponds;
      state.decor.forests = forests;
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function dist(x1, y1, x2, y2) {
      return Math.hypot(x2 - x1, y2 - y1);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function angleTo(x1, y1, x2, y2) {
      return Math.atan2(y2 - y1, x2 - x1);
    }

    function wrapAngle(angle) {
      while (angle > Math.PI) angle -= Math.PI * 2;
      while (angle < -Math.PI) angle += Math.PI * 2;
      return angle;
    }

    function createPlane(options = {}) {
      const onScreen = !!options.onScreen;
      const easy = !!options.easy;
      const side = Math.floor(Math.random() * 4);
      let x, y;

      if (onScreen) {
        x = clamp(runway.centerX + rand(-120, 120), 70, w - 70);
        y = clamp(h * 0.22 + rand(-40, 40), 70, h * 0.42);
      } else if (side === 0) {
        x = -35;
        y = rand(40, h - 40);
      } else if (side === 1) {
        x = w + 35;
        y = rand(40, h - 40);
      } else if (side === 2) {
        x = rand(40, w - 40);
        y = -35;
      } else {
        x = rand(40, w - 40);
        y = h + 35;
      }

      const holdingPoint = easy ? {
        x: runway.centerX + rand(-40, 40),
        y: runway.y - rand(70, 110)
      } : {
        x: runway.centerX + rand(-110, 110),
        y: runway.y - rand(80, 150)
      };

      const startAngle = angleTo(x, y, holdingPoint.x, holdingPoint.y);
      const baseSpeed = easy
        ? 17 + rand(0, 1.5)
        : 21 + state.level * 1.4 + rand(0, 3);

      return {
        id: state.nextPlaneId++,
        x,
        y,
        speed: options.speed || baseSpeed,
        radius: 14,
        angle: startAngle,
        path: [holdingPoint],
        pathIndex: 0,
        selected: false,
        landing: false,
        landed: false,
        crash: false,
        spawnedAt: state.elapsed,
        color: `hsl(${Math.floor(rand(0, 360))} 80% 60%)`
      };
    }

    function spawnOpeningScenario() {
      state.planes.push(createPlane({ onScreen: true, easy: true }));
      state.spawnTimer = -2.5;
    }

    function resetGame() {
      state.planes = [];
      state.score = 0;
      state.gameOver = false;
      state.selectedPlaneId = null;
      state.drawing = false;
      state.drawPoints = [];
      state.nextPlaneId = 1;
      state.lastTime = 0;
      state.spawnTimer = 0;
      state.spawnInterval = 4.5;
      state.elapsed = 0;
      state.difficultyTimer = 0;
      state.level = 1;
      state.popups = [];
      state.conflicts = [];
      gameOverEl.style.display = "none";

      spawnOpeningScenario();

      updateUI();
    }

    function updateUI() {
      scoreEl.textContent = state.score;
      planesEl.textContent = state.planes.length;
      levelEl.textContent = state.level;
    }

    function getPointerPos(e) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches && e.touches[0] ? e.touches[0] : e;
      return {
        x: touch.clientX - rect.left,
        y: touch.clientY - rect.top
      };
    }

    function getPlaneAt(x, y) {
      let bestPlane = null;
      let bestDistance = Infinity;

      for (let i = 0; i < state.planes.length; i++) {
        const p = state.planes[i];
        const hitRadius = p.radius + 22;
        const d = dist(x, y, p.x, p.y);
        if (d <= hitRadius && d < bestDistance) {
          bestPlane = p;
          bestDistance = d;
        }
      }

      return bestPlane;
    }

    function deselectAllPlanes() {
      for (const p of state.planes) p.selected = false;
    }

    function simplifyPath(points, minStep) {
      if (points.length <= 2) return points.slice();
      const out = [points[0]];
      for (let i = 1; i < points.length; i++) {
        const prev = out[out.length - 1];
        if (dist(prev.x, prev.y, points[i].x, points[i].y) >= minStep) {
          out.push(points[i]);
        }
      }
      if (out[out.length - 1] !== points[points.length - 1]) {
        out.push(points[points.length - 1]);
      }
      return out;
    }

    function isAlignedForLanding(angle) {
      return Math.abs(wrapAngle(angle - Math.PI * 0.5)) < 0.5;
    }

    function awardLanding(plane) {
      if (plane.landed) return;
      plane.landed = true;
      state.score += 10;
      state.popups.push({
        x: plane.x,
        y: plane.y - 12,
        text: "+10",
        life: 1.0
      });
    }

    function updateDifficulty() {
      if (state.score < 10) {
        state.level = 1;
        state.spawnInterval = 6.0;
      } else if (state.score < 40) {
        state.level = 2;
        state.spawnInterval = 4.8;
      } else if (state.score < 80) {
        state.level = 3;
        state.spawnInterval = 4.0;
      } else {
        state.level = 4;
        state.spawnInterval = 3.4;
      }
    }

    function strokeSmoothPath(points) {
      if (!points || points.length === 0) return;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);

      if (points.length === 1) {
        ctx.lineTo(points[0].x, points[0].y);
      } else if (points.length === 2) {
        ctx.lineTo(points[1].x, points[1].y);
      } else {
        for (let i = 1; i < points.length - 1; i++) {
          const midX = (points[i].x + points[i + 1].x) * 0.5;
          const midY = (points[i].y + points[i + 1].y) * 0.5;
          ctx.quadraticCurveTo(points[i].x, points[i].y, midX, midY);
        }
        const last = points[points.length - 1];
        ctx.lineTo(last.x, last.y);
      }

      ctx.stroke();
    }

    function handleStart(e) {
      if (state.gameOver) return;
      e.preventDefault();

      const pos = getPointerPos(e);
      const plane = getPlaneAt(pos.x, pos.y);

      state.drawPoints = [];
      state.drawing = false;

      if (!plane) {
        return;
      }

      deselectAllPlanes();
      plane.selected = true;
      state.selectedPlaneId = plane.id;
      state.drawing = true;
      state.drawPoints = [{ x: plane.x, y: plane.y }, { x: pos.x, y: pos.y }];
    }

    function handleMove(e) {
      if (state.gameOver || !state.drawing || state.selectedPlaneId == null) return;
      e.preventDefault();

      const pos = getPointerPos(e);
      const last = state.drawPoints[state.drawPoints.length - 1];
      if (!last || dist(last.x, last.y, pos.x, pos.y) > 8) {
        state.drawPoints.push({ x: pos.x, y: pos.y });
      }
    }

    function handleEnd(e) {
      if (state.gameOver) return;
      if (!state.drawing || state.selectedPlaneId == null) return;
      e.preventDefault();

      const plane = state.planes.find(p => p.id === state.selectedPlaneId);
      if (plane && state.drawPoints.length >= 2) {
        const path = simplifyPath(state.drawPoints, 10);
        const end = path[path.length - 1];

        const finalApproach = {
          x: runway.centerX,
          y: runway.y - 26
        };

        if (dist(end.x, end.y, finalApproach.x, finalApproach.y) > 28) {
          path.push({
            x: lerp(end.x, finalApproach.x, 0.5),
            y: lerp(end.y, finalApproach.y, 0.5)
          });
        }

        path.push(finalApproach);
        path.push({ x: runway.centerX, y: runway.centerY });
        path.push({ x: runway.exitX, y: runway.exitY });

        plane.path = path.slice(1);
        plane.pathIndex = 0;
        plane.landing = true;
      }

      if (plane) plane.selected = false;
      state.selectedPlaneId = null;
      state.drawing = false;
      state.drawPoints = [];
    }

    function update(delta) {
      if (state.gameOver) return;

      state.elapsed += delta;
      state.spawnTimer += delta;
      state.difficultyTimer += delta;

      updateDifficulty();

      if (state.spawnTimer >= state.spawnInterval) {
        state.spawnTimer = 0;
        state.planes.push(createPlane());
      }

      for (const plane of state.planes) {
        updatePlane(plane, delta);
      }

      for (const popup of state.popups) {
        popup.y -= 24 * delta;
        popup.life -= delta;
      }

      state.conflicts = [];
      handleCollisions();

      state.planes = state.planes.filter(p => !p.landed && !p.crash);
      state.popups = state.popups.filter(p => p.life > 0);

      if (state.planes.length > 22) {
        endGame();
      }

      updateUI();
    }

    function updatePlane(plane, delta) {
      const planeAge = state.elapsed - (plane.spawnedAt || 0);
      const accelerationEnabled = state.score >= 10 && planeAge > 6;
      if (accelerationEnabled) {
        plane.speed = Math.min(40, plane.speed + delta * 0.05);
      }

      let target = plane.path[plane.pathIndex];
      if (!target) {
        target = { x: runway.centerX, y: runway.y - 60 };
      }

      const desiredAngle = angleTo(plane.x, plane.y, target.x, target.y);
      const angleDiff = wrapAngle(desiredAngle - plane.angle);
      const turnRate = (plane.landing ? 1.25 : 1.1) * delta;
      plane.angle += clamp(angleDiff, -turnRate, turnRate);

      plane.x += Math.cos(plane.angle) * plane.speed * delta;
      plane.y += Math.sin(plane.angle) * plane.speed * delta;

      if (dist(plane.x, plane.y, target.x, target.y) < Math.max(14, plane.speed * delta * 1.9)) {
        plane.pathIndex++;
      }

      if (plane.landing) {
        const isOnFinal = plane.pathIndex >= plane.path.length - 2;
        if (isOnFinal) {
          plane.speed = Math.max(20, plane.speed * 0.994);
        }

        const crossedThreshold = plane.y >= runway.y + 16;
        const centeredOnRunway = Math.abs(plane.x - runway.centerX) < runway.width * 0.32;
        if (crossedThreshold && centeredOnRunway && isAlignedForLanding(plane.angle)) {
          awardLanding(plane);
          return;
        }
      }

      if (
        plane.x < -160 ||
        plane.x > w + 160 ||
        plane.y < -160 ||
        plane.y > h + 160
      ) {
        plane.crash = true;
      }
    }

    function handleCollisions() {
      for (let i = 0; i < state.planes.length; i++) {
        for (let j = i + 1; j < state.planes.length; j++) {
          const a = state.planes[i];
          const b = state.planes[j];
          const d = dist(a.x, a.y, b.x, b.y);
          const aAge = state.elapsed - (a.spawnedAt || 0);
          const bAge = state.elapsed - (b.spawnedAt || 0);
          const inSpawnGrace = aAge < 1.75 || bAge < 1.75;

          if (d < 78) {
            state.conflicts.push({ ax: a.x, ay: a.y, bx: b.x, by: b.y, danger: d < 42 });
          }

          if (d < 22 && !inSpawnGrace) {
            a.crash = true;
            b.crash = true;
            endGame();
            return;
          }
        }
      }

      if (state.planes.some(p => p.crash)) {
        endGame();
      }
    }

    function endGame() {
      state.gameOver = true;
      finalScoreEl.textContent = state.score;
      gameOverEl.style.display = "flex";
    }

    function drawApproachCue() {
      ctx.save();
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.beginPath();
      ctx.moveTo(runway.centerX, runway.y + 8);
      ctx.lineTo(runway.centerX - runway.gateHalfWidth, runway.gateY);
      ctx.lineTo(runway.centerX + runway.gateHalfWidth, runway.gateY);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 6]);
      ctx.beginPath();
      ctx.moveTo(runway.centerX - runway.gateHalfWidth, runway.gateY);
      ctx.lineTo(runway.centerX + runway.gateHalfWidth, runway.gateY);
      ctx.stroke();
      ctx.restore();
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
    }

    function draw() {
      ctx.clearRect(0, 0, w, h);
      drawLandscape();
      drawApproachCue();
      drawRunway();
      drawGuides();
      drawConflicts();
      drawPlanes();
      drawPopups();
    }

    function drawLandscape() {
      ctx.fillStyle = "#78b85f";
      ctx.fillRect(0, 0, w, h);

      for (const field of state.decor.fields) {
        ctx.fillStyle = field.color;
        roundRect(ctx, field.x, field.y, field.w, field.h, 16);
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 2;
        for (let x = field.x + 14; x < field.x + field.w - 10; x += 18) {
          ctx.beginPath();
          ctx.moveTo(x, field.y + 6);
          ctx.lineTo(x, field.y + field.h - 6);
          ctx.stroke();
        }
      }

      for (const pond of state.decor.ponds) {
        ctx.fillStyle = "#4ea3d8";
        ctx.beginPath();
        ctx.ellipse(
          pond.x + pond.w * 0.5,
          pond.y + pond.h * 0.5,
          pond.w * 0.5,
          pond.h * 0.5,
          0,
          0,
          Math.PI * 2
        );
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      const size = 52;
      for (let x = 0; x <= w; x += size) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = 0; y <= h; y += size) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "#c7b08a";
      ctx.lineWidth = 8;
      ctx.lineCap = "round";

      ctx.beginPath();
      ctx.moveTo(0, h * 0.22);
      ctx.quadraticCurveTo(w * 0.25, h * 0.28, w * 0.42, h * 0.18);
      ctx.quadraticCurveTo(w * 0.62, h * 0.08, w, h * 0.16);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(w * 0.1, h);
      ctx.quadraticCurveTo(w * 0.18, h * 0.8, w * 0.3, h * 0.74);
      ctx.quadraticCurveTo(w * 0.42, h * 0.69, w * 0.58, h * 0.78);
      ctx.stroke();

      for (const forest of state.decor.forests) {
        for (const tree of forest) {
          ctx.fillStyle = tree.color;
          ctx.beginPath();
          ctx.arc(tree.x, tree.y, tree.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawRunway() {
      ctx.save();

      ctx.fillStyle = "#687177";
      roundRect(ctx, runway.x - 54, runway.y - 38, runway.width + 108, runway.height + 76, 18);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.14)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(runway.x - 18, runway.centerY);
      ctx.lineTo(runway.x - 54, runway.centerY);
      ctx.lineTo(runway.x - 54, runway.centerY + 80);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(runway.x + runway.width + 18, runway.centerY - 36);
      ctx.lineTo(runway.x + runway.width + 54, runway.centerY - 36);
      ctx.lineTo(runway.x + runway.width + 54, runway.centerY - 110);
      ctx.stroke();

      ctx.fillStyle = "rgba(0,0,0,0.18)";
      roundRect(ctx, runway.x + 5, runway.y + 8, runway.width, runway.height, 10);
      ctx.fill();

      ctx.fillStyle = "#4a5056";
      roundRect(ctx, runway.x, runway.y, runway.width, runway.height, 10);
      ctx.fill();

      ctx.fillStyle = "#aeb5ba";
      ctx.fillRect(runway.x - 24, runway.y + runway.height * 0.5 - 4, 24, 8);
      ctx.fillRect(runway.x + runway.width, runway.y + runway.height * 0.5 - 4, 24, 8);

      ctx.strokeStyle = "#dfe5ea";
      ctx.lineWidth = 2;

      const dashCount = 8;
      const dashH = runway.height / (dashCount * 2);
      for (let i = 0; i < dashCount; i++) {
        const dy = runway.y + dashH * (i * 2 + 0.55);
        ctx.beginPath();
        ctx.moveTo(runway.centerX, dy);
        ctx.lineTo(runway.centerX, dy + dashH * 0.9);
        ctx.stroke();
      }

      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 3;
      ctx.strokeRect(runway.x + 18, runway.y + 12, runway.width - 36, 18);
      ctx.strokeRect(runway.x + 18, runway.y + runway.height - 30, runway.width - 36, 18);

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 14px Arial";
      ctx.fillText("18", runway.centerX - 8, runway.y + 28);
      ctx.fillText("36", runway.centerX - 8, runway.y + runway.height - 14);

      ctx.restore();
    }

    function drawGuides() {
      if (state.drawPoints.length > 1) {
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.95)";
        ctx.lineWidth = 3;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.setLineDash([10, 8]);
        strokeSmoothPath(state.drawPoints);
        ctx.restore();
      }

      for (const p of state.planes) {
        if (p.path && p.path.length > p.pathIndex) {
          ctx.save();
          ctx.strokeStyle = p.selected ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.42)";
          ctx.lineWidth = p.selected ? 3 : 2;
          ctx.setLineDash([6, 6]);
          const routePoints = [{ x: p.x, y: p.y }, ...p.path.slice(p.pathIndex)];
          strokeSmoothPath(routePoints);
          ctx.restore();
        }
      }
    }

    function drawConflicts() {
      for (const conflict of state.conflicts) {
        ctx.save();
        ctx.strokeStyle = conflict.danger ? "rgba(255, 80, 80, 0.9)" : "rgba(255, 210, 80, 0.75)";
        ctx.lineWidth = conflict.danger ? 3 : 2;
        ctx.setLineDash([6, 6]);
        ctx.beginPath();
        ctx.moveTo(conflict.ax, conflict.ay);
        ctx.lineTo(conflict.bx, conflict.by);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawPopups() {
      for (const popup of state.popups) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, popup.life);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 20px Arial";
        ctx.textAlign = "center";
        ctx.fillText(popup.text, popup.x, popup.y);
        ctx.restore();
      }
    }

    function drawPlanes() {
      for (const plane of state.planes) {
        drawPlane(plane);
      }
    }

    function drawPlane(plane) {
      ctx.save();
      ctx.translate(plane.x, plane.y);
      ctx.rotate(plane.angle);

      if (plane.selected) {
        const pulse = 1 + Math.sin(state.elapsed * 5.5) * 0.08;
        ctx.beginPath();
        ctx.arc(0, 0, (plane.radius + 10) * pulse, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255,255,255,0.98)";
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, 0, plane.radius + 16, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(0, 220, 255, 0.45)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      ctx.fillStyle = plane.color;
      ctx.strokeStyle = "rgba(0,0,0,0.32)";
      ctx.lineWidth = 1.5;

      ctx.beginPath();
      ctx.moveTo(18, 0);
      ctx.lineTo(8, -6);
      ctx.lineTo(3, -6);
      ctx.lineTo(-3, -14);
      ctx.lineTo(-7, -14);
      ctx.lineTo(-5, -4);
      ctx.lineTo(-16, -4);
      ctx.lineTo(-16, 4);
      ctx.lineTo(-5, 4);
      ctx.lineTo(-7, 14);
      ctx.lineTo(-3, 14);
      ctx.lineTo(3, 6);
      ctx.lineTo(8, 6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.beginPath();
      ctx.arc(10, 0, 2.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function loop(ts) {
      if (!state.lastTime) state.lastTime = ts;
      let delta = (ts - state.lastTime) / 1000;
      state.lastTime = ts;
      delta = Math.min(delta, 0.033);

      update(delta);
      draw();
      requestAnimationFrame(loop);
    }

    canvas.addEventListener("mousedown", handleStart);
    canvas.addEventListener("mousemove", handleMove);
    canvas.addEventListener("mouseup", handleEnd);
    canvas.addEventListener("mouseleave", handleEnd);

    canvas.addEventListener("touchstart", handleStart, { passive: false });
    canvas.addEventListener("touchmove", handleMove, { passive: false });
    canvas.addEventListener("touchend", handleEnd, { passive: false });
    canvas.addEventListener("touchcancel", handleEnd, { passive: false });

    restartBtn.addEventListener("click", resetGame);
    window.addEventListener("resize", resize);

    resize();
    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>

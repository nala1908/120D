<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Top Down Air Traffic Control</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #6caf5c;
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #6caf5c;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.45);
      font-size: 18px;
      line-height: 1.45;
      user-select: none;
      pointer-events: none;
    }

    #hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 15px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.45);
      user-select: none;
      pointer-events: none;
      text-align: center;
      padding: 0 10px;
    }

    #gameOver {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      z-index: 20;
    }

    #gameOver .panel {
      background: rgba(15, 25, 35, 0.94);
      color: white;
      padding: 24px 28px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
      min-width: 280px;
    }

    #gameOver h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    #gameOver p {
      margin: 8px 0;
      font-size: 18px;
    }

    #restartBtn {
      margin-top: 16px;
      font-size: 18px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #3fa9f5;
      color: white;
      cursor: pointer;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Planes: <span id="planes">0</span></div>
    <div>Level: <span id="level">1</span></div>
  </div>

  <div id="hint">Tap a plane, then draw a path to the runway</div>

  <div id="gameOver">
    <div class="panel">
      <h1>Game Over</h1>
      <p>Final Score: <span id="finalScore">0</span></p>
      <p>Planes got too close.</p>
      <button id="restartBtn">Restart</button>
    </div>
  </div>

  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const planesEl = document.getElementById("planes");
    const levelEl = document.getElementById("level");
    const gameOverEl = document.getElementById("gameOver");
    const finalScoreEl = document.getElementById("finalScore");
    const restartBtn = document.getElementById("restartBtn");

    let w = 0;
    let h = 0;
    let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

    const state = {
      planes: [],
      score: 0,
      gameOver: false,
      selectedPlaneId: null,
      drawing: false,
      drawPoints: [],
      nextPlaneId: 1,
      lastTime: 0,
      spawnTimer: 0,
      spawnInterval: 4.2,
      elapsed: 0,
      difficultyTimer: 0,
      level: 1,
      decor: {
        fields: [],
        ponds: []
      }
    };

    const runway = {
      x: 0,
      y: 0,
      width: 0,
      height: 0,
      entryX: 0,
      entryY: 0,
      endX: 0,
      endY: 0,
      angle: 0
    };

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      setupRunway();
      generateLandscape();
    }

    function setupRunway() {
      runway.width = Math.min(240, w * 0.34);
      runway.height = Math.max(26, h * 0.045);
      runway.x = w * 0.5 - runway.width * 0.5;
      runway.y = h * 0.74;
      runway.entryX = runway.x + runway.width * 0.5;
      runway.entryY = runway.y;
      runway.endX = runway.x + runway.width * 0.5;
      runway.endY = runway.y + runway.height;
      runway.angle = Math.PI / 2;
    }

    function generateLandscape() {
      const fields = [];
      const ponds = [];

      for (let i = 0; i < 10; i++) {
        const fw = rand(90, 220);
        const fh = rand(70, 180);
        const fx = rand(20, w - fw - 20);
        const fy = rand(20, h - fh - 20);

        if (rectsOverlap(
          fx, fy, fw, fh,
          runway.x - 70, runway.y - 100, runway.width + 140, runway.height + 180
        )) {
          continue;
        }

        fields.push({
          x: fx,
          y: fy,
          w: fw,
          h: fh,
          color: [
            "#83bb68",
            "#78b25f",
            "#95c46d",
            "#a7c97a",
            "#6fa85a"
          ][Math.floor(Math.random() * 5)]
        });
      }

      for (let i = 0; i < 2; i++) {
        const pw = rand(60, 120);
        const ph = rand(40, 90);
        const px = rand(30, w - pw - 30);
        const py = rand(30, h - ph - 30);

        if (rectsOverlap(
          px, py, pw, ph,
          runway.x - 80, runway.y - 120, runway.width + 160, runway.height + 220
        )) {
          continue;
        }

        ponds.push({ x: px, y: py, w: pw, h: ph });
      }

      state.decor.fields = fields;
      state.decor.ponds = ponds;
    }

    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function dist(x1, y1, x2, y2) {
      return Math.hypot(x2 - x1, y2 - y1);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function angleTo(x1, y1, x2, y2) {
      return Math.atan2(y2 - y1, x2 - x1);
    }

    function wrapAngle(angle) {
      while (angle > Math.PI) angle -= Math.PI * 2;
      while (angle < -Math.PI) angle += Math.PI * 2;
      return angle;
    }

    function createPlane() {
      const side = Math.floor(Math.random() * 4);
      let x, y;

      if (side === 0) {
        x = -35;
        y = rand(40, h * 0.55);
      } else if (side === 1) {
        x = w + 35;
        y = rand(40, h * 0.55);
      } else if (side === 2) {
        x = rand(40, w - 40);
        y = -35;
      } else {
        x = rand(40, w - 40);
        y = h + 35;
      }

      const holdingPoint = {
        x: runway.entryX + rand(-80, 80),
        y: runway.entryY - rand(90, 150)
      };

      const startAngle = angleTo(x, y, holdingPoint.x, holdingPoint.y);
      const baseSpeed = 34 + state.level * 3 + rand(0, 6);

      return {
        id: state.nextPlaneId++,
        x,
        y,
        speed: baseSpeed,
        radius: 14,
        angle: startAngle,
        path: [holdingPoint],
        pathIndex: 0,
        selected: false,
        landing: false,
        landed: false,
        crash: false,
        color: `hsl(${Math.floor(rand(0, 360))} 80% 60%)`
      };
    }

    function resetGame() {
      state.planes = [];
      state.score = 0;
      state.gameOver = false;
      state.selectedPlaneId = null;
      state.drawing = false;
      state.drawPoints = [];
      state.nextPlaneId = 1;
      state.lastTime = 0;
      state.spawnTimer = 0;
      state.spawnInterval = 4.2;
      state.elapsed = 0;
      state.difficultyTimer = 0;
      state.level = 1;
      gameOverEl.style.display = "none";

      for (let i = 0; i < 2; i++) {
        state.planes.push(createPlane());
      }

      updateUI();
    }

    function updateUI() {
      scoreEl.textContent = state.score;
      planesEl.textContent = state.planes.length;
      levelEl.textContent = state.level;
    }

    function getPointerPos(e) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches && e.touches[0] ? e.touches[0] : e;
      return {
        x: touch.clientX - rect.left,
        y: touch.clientY - rect.top
      };
    }

    function getPlaneAt(x, y) {
      for (let i = state.planes.length - 1; i >= 0; i--) {
        const p = state.planes[i];
        if (dist(x, y, p.x, p.y) <= p.radius + 12) return p;
      }
      return null;
    }

    function deselectAllPlanes() {
      for (const p of state.planes) p.selected = false;
    }

    function simplifyPath(points, minStep) {
      if (points.length <= 2) return points.slice();
      const out = [points[0]];
      for (let i = 1; i < points.length; i++) {
        const prev = out[out.length - 1];
        if (dist(prev.x, prev.y, points[i].x, points[i].y) >= minStep) {
          out.push(points[i]);
        }
      }
      if (out[out.length - 1] !== points[points.length - 1]) {
        out.push(points[points.length - 1]);
      }
      return out;
    }

    function handleStart(e) {
      if (state.gameOver) return;
      e.preventDefault();

      const pos = getPointerPos(e);
      const plane = getPlaneAt(pos.x, pos.y);

      deselectAllPlanes();
      state.selectedPlaneId = null;
      state.drawPoints = [];
      state.drawing = false;

      if (plane) {
        plane.selected = true;
        state.selectedPlaneId = plane.id;
        state.drawing = true;
        state.drawPoints = [{ x: plane.x, y: plane.y }, { x: pos.x, y: pos.y }];
      }
    }

    function handleMove(e) {
      if (state.gameOver || !state.drawing || state.selectedPlaneId == null) return;
      e.preventDefault();

      const pos = getPointerPos(e);
      const last = state.drawPoints[state.drawPoints.length - 1];
      if (!last || dist(last.x, last.y, pos.x, pos.y) > 8) {
        state.drawPoints.push({ x: pos.x, y: pos.y });
      }
    }

    function handleEnd(e) {
      if (state.gameOver) return;
      if (!state.drawing || state.selectedPlaneId == null) return;
      e.preventDefault();

      const plane = state.planes.find(p => p.id === state.selectedPlaneId);
      if (plane && state.drawPoints.length >= 2) {
        const path = simplifyPath(state.drawPoints, 10);
        const end = path[path.length - 1];

        const runwayQueuePoint = {
          x: runway.entryX,
          y: runway.entryY - 24
        };

        if (dist(end.x, end.y, runwayQueuePoint.x, runwayQueuePoint.y) > 24) {
          path.push({
            x: lerp(end.x, runwayQueuePoint.x, 0.5),
            y: lerp(end.y, runwayQueuePoint.y, 0.5)
          });
        }

        path.push(runwayQueuePoint);
        path.push({ x: runway.entryX, y: runway.entryY + 8 });
        path.push({ x: runway.endX, y: runway.endY + 28 });

        plane.path = path.slice(1);
        plane.pathIndex = 0;
        plane.landing = true;
      }

      if (plane) plane.selected = false;
      state.selectedPlaneId = null;
      state.drawing = false;
      state.drawPoints = [];
    }

    function update(delta) {
      if (state.gameOver) return;

      state.elapsed += delta;
      state.spawnTimer += delta;
      state.difficultyTimer += delta;

      if (state.difficultyTimer >= 10) {
        state.difficultyTimer = 0;
        state.level += 1;
        state.spawnInterval = Math.max(1.0, state.spawnInterval - 0.2);
        for (const p of state.planes) {
          p.speed *= 1.05;
        }
      }

      if (state.spawnTimer >= state.spawnInterval) {
        state.spawnTimer = 0;
        state.planes.push(createPlane());
      }

      for (const plane of state.planes) {
        updatePlane(plane, delta);
      }

      handleCollisions();

      state.planes = state.planes.filter(p => !p.landed && !p.crash);

      if (state.planes.length > 22) {
        endGame();
      }

      updateUI();
    }

    function updatePlane(plane, delta) {
      plane.speed += delta * 0.18;

      let target = plane.path[plane.pathIndex];
      if (!target) {
        target = { x: runway.entryX, y: runway.entryY - 60 };
      }

      const desiredAngle = angleTo(plane.x, plane.y, target.x, target.y);
      const angleDiff = wrapAngle(desiredAngle - plane.angle);
      const turnRate = 1.45 * delta;
      plane.angle += clamp(angleDiff, -turnRate, turnRate);

      plane.x += Math.cos(plane.angle) * plane.speed * delta;
      plane.y += Math.sin(plane.angle) * plane.speed * delta;

      if (dist(plane.x, plane.y, target.x, target.y) < Math.max(14, plane.speed * delta * 1.8)) {
        plane.pathIndex++;
      }

      if (plane.landing) {
        const isOnFinal = plane.pathIndex >= plane.path.length - 2;
        if (isOnFinal) {
          plane.speed = Math.max(20, plane.speed * 0.992);
        }

        if (
          plane.y > runway.endY + 18 &&
          Math.abs(plane.x - runway.endX) < runway.width * 0.35
        ) {
          plane.landed = true;
          state.score += 10;
        }
      }

      if (
        plane.x < -140 ||
        plane.x > w + 140 ||
        plane.y < -140 ||
        plane.y > h + 140
      ) {
        plane.crash = true;
      }
    }

    function handleCollisions() {
      for (let i = 0; i < state.planes.length; i++) {
        for (let j = i + 1; j < state.planes.length; j++) {
          const a = state.planes[i];
          const b = state.planes[j];
          const d = dist(a.x, a.y, b.x, b.y);

          if (d < 20) {
            a.crash = true;
            b.crash = true;
            endGame();
            return;
          }
        }
      }

      if (state.planes.some(p => p.crash)) {
        endGame();
      }
    }

    function endGame() {
      state.gameOver = true;
      finalScoreEl.textContent = state.score;
      gameOverEl.style.display = "flex";
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
    }

    function draw() {
      ctx.clearRect(0, 0, w, h);
      drawLandscape();
      drawRunway();
      drawGuides();
      drawPlanes();
    }

    function drawLandscape() {
      ctx.fillStyle = "#78b85f";
      ctx.fillRect(0, 0, w, h);

      for (const field of state.decor.fields) {
        ctx.fillStyle = field.color;
        roundRect(ctx, field.x, field.y, field.w, field.h, 16);
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 2;
        for (let x = field.x + 14; x < field.x + field.w - 10; x += 18) {
          ctx.beginPath();
          ctx.moveTo(x, field.y + 6);
          ctx.lineTo(x, field.y + field.h - 6);
          ctx.stroke();
        }
      }

      for (const pond of state.decor.ponds) {
        ctx.fillStyle = "#4ea3d8";
        ctx.beginPath();
        ctx.ellipse(pond.x + pond.w * 0.5, pond.y + pond.h * 0.5, pond.w * 0.5, pond.h * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      const size = 52;
      for (let x = 0; x <= w; x += size) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = 0; y <= h; y += size) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "#c7b08a";
      ctx.lineWidth = 8;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(0, h * 0.22);
      ctx.quadraticCurveTo(w * 0.25, h * 0.28, w * 0.42, h * 0.18);
      ctx.quadraticCurveTo(w * 0.62, h * 0.08, w, h * 0.16);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(w * 0.1, h);
      ctx.quadraticCurveTo(w * 0.18, h * 0.8, w * 0.3, h * 0.74);
      ctx.quadraticCurveTo(w * 0.42, h * 0.69, w * 0.58, h * 0.78);
      ctx.stroke();

      drawTreeClusters();
    }

    function drawTreeClusters() {
      const clusters = [
        [w * 0.13, h * 0.14],
        [w * 0.82, h * 0.2],
        [w * 0.18, h * 0.78],
        [w * 0.82, h * 0.72],
        [w * 0.68, h * 0.48]
      ];

      for (const [cx, cy] of clusters) {
        for (let i = 0; i < 7; i++) {
          const x = cx + rand(-28, 28);
          const y = cy + rand(-28, 28);
          ctx.fillStyle = i % 2 === 0 ? "#3f7f3d" : "#2f6b35";
          ctx.beginPath();
          ctx.arc(x, y, rand(8, 13), 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawRunway() {
      ctx.save();

      ctx.fillStyle = "rgba(0,0,0,0.18)";
      roundRect(ctx, runway.x + 5, runway.y + 8, runway.width, runway.height, 10);
      ctx.fill();

      ctx.fillStyle = "#4a5056";
      roundRect(ctx, runway.x, runway.y, runway.width, runway.height, 10);
      ctx.fill();

      ctx.strokeStyle = "#dfe5ea";
      ctx.lineWidth = 2;

      const dashCount = 7;
      const dashH = runway.height / (dashCount * 2);
      for (let i = 0; i < dashCount; i++) {
        const dy = runway.y + dashH * (i * 2 + 0.55);
        ctx.beginPath();
        ctx.moveTo(runway.x + runway.width / 2, dy);
        ctx.lineTo(runway.x + runway.width / 2, dy + dashH * 0.9);
        ctx.stroke();
      }

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 14px Arial";
      ctx.fillText("18", runway.x + runway.width / 2 - 8, runway.y + 18);
      ctx.fillText("36", runway.x + runway.width / 2 - 8, runway.y + runway.height - 8);

      ctx.fillStyle = "#d2d7db";
      ctx.fillRect(runway.x - 40, runway.y + runway.height * 0.5 - 6, 40, 12);
      ctx.fillRect(runway.x + runway.width, runway.y + runway.height * 0.5 - 6, 40, 12);

      ctx.restore();
    }

    function drawGuides() {
      if (state.drawPoints.length > 1) {
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.95)";
        ctx.lineWidth = 3;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.setLineDash([10, 8]);
        ctx.beginPath();
        ctx.moveTo(state.drawPoints[0].x, state.drawPoints[0].y);
        for (let i = 1; i < state.drawPoints.length; i++) {
          ctx.lineTo(state.drawPoints[i].x, state.drawPoints[i].y);
        }
        ctx.stroke();
        ctx.restore();
      }

      for (const p of state.planes) {
        if (p.path && p.path.length > p.pathIndex) {
          ctx.save();
          ctx.strokeStyle = "rgba(255,255,255,0.35)";
          ctx.lineWidth = 2;
          ctx.setLineDash([6, 6]);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          for (let i = p.pathIndex; i < p.path.length; i++) {
            ctx.lineTo(p.path[i].x, p.path[i].y);
          }
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    function drawPlanes() {
      for (const plane of state.planes) {
        drawPlane(plane);
      }
    }

    function drawPlane(plane) {
      ctx.save();
      ctx.translate(plane.x, plane.y);
      ctx.rotate(plane.angle);

      if (plane.selected) {
        ctx.beginPath();
        ctx.arc(0, 0, plane.radius + 8, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255,255,255,0.95)";
        ctx.lineWidth = 3;
        ctx.stroke();
      }

      ctx.fillStyle = plane.color;
      ctx.strokeStyle = "rgba(0,0,0,0.32)";
      ctx.lineWidth = 1.5;

      ctx.beginPath();
      ctx.moveTo(18, 0);
      ctx.lineTo(8, -6);
      ctx.lineTo(3, -6);
      ctx.lineTo(-3, -14);
      ctx.lineTo(-7, -14);
      ctx.lineTo(-5, -4);
      ctx.lineTo(-16, -4);
      ctx.lineTo(-16, 4);
      ctx.lineTo(-5, 4);
      ctx.lineTo(-7, 14);
      ctx.lineTo(-3, 14);
      ctx.lineTo(3, 6);
      ctx.lineTo(8, 6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.beginPath();
      ctx.arc(10, 0, 2.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function loop(ts) {
      if (!state.lastTime) state.lastTime = ts;
      let delta = (ts - state.lastTime) / 1000;
      state.lastTime = ts;
      delta = Math.min(delta, 0.033);

      update(delta);
      draw();
      requestAnimationFrame(loop);
    }

    canvas.addEventListener("mousedown", handleStart);
    canvas.addEventListener("mousemove", handleMove);
    canvas.addEventListener("mouseup", handleEnd);
    canvas.addEventListener("mouseleave", handleEnd);
    canvas.addEventListener("touchstart", handleStart, { passive: false });
    canvas.addEventListener("touchmove", handleMove, { passive: false });
    canvas.addEventListener("touchend", handleEnd, { passive: false });
    canvas.addEventListener("touchcancel", handleEnd, { passive: false });
    restartBtn.addEventListener("click", resetGame);
    window.addEventListener("resize", resize);

    resize();
    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
